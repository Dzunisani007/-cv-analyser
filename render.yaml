services:
  - type: web
    name: cv-analyser-service
    env: python
    plan: free
    buildCommand: pip install -r requirements.runtime.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
        value: a262029a40fd49e85f1d56178af894d9
      - key: HF_API_TOKEN
        sync: false
      - key: NER_MODEL
        value: dslim/bert-base-NER
      - key: NER_MODE
        value: transformers
      - key: GLINER_MODEL
        value: urchade/gliner_base-v2.1
      - key: STRUCTURED_EXTRACTION_MODEL
        value: microsoft/DialoGPT-medium
      - key: ENABLE_STRUCTURED_EXTRACTION
        value: true
      - key: WORKER_COUNT
        value: 2
      - key: SKIP_MODEL_LOAD
        value: false
      - key: INLINE_JOBS
        value: true
      - key: PROMETHEUS_ENABLED
        value: true
      - key: DEBUG
        value: false
      - key: PGVECTOR_ENABLED
        value: false
      - key: EMBED_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: STORAGE_BACKEND
        value: local
