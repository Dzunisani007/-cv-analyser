version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cv_service
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  service:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  db-data:
